<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta http-equiv="permissions-policy" content="camera=(self)" />
  <title>AR Frame — The Golden Frame</title>

  <!--
    Import map must appear first so modulepreload hints below can resolve
    the "three" specifier when the browser pre-parses mind-ar's imports.
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.132.2/examples/jsm/"
    }
  }
  </script>

  <!--
    modulepreload (not preload as="script") is the correct hint for ES modules.
    It tells the browser to download AND parse/compile each module eagerly —
    saving ~1-2s of compile time on mobile before the module script even runs.
    Three.js first so mind-ar's internal import resolves from the pre-compiled cache.
  -->
  <link rel="modulepreload" crossorigin href="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.module.js">
  <link rel="modulepreload" crossorigin href="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js">

  <!-- Early connection to CDN and asset origins -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://pub-4bff56c624244a6f948d870f253a8b4c.r2.dev" crossorigin>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #0a0a0a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    /* ── Loading screen ───────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #0a0a0a 0%, #1a1408 100%);
      z-index: 10; padding: 32px;
    }

    #loading-logo {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 20px;
      box-shadow: 0 0 32px rgba(251,191,36,0.25);
    }

    #loading-title {
      color: #fff; font-size: 17px; font-weight: 600; letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    #loading-sub {
      color: rgba(255,255,255,0.45); font-size: 13px; margin-bottom: 28px;
      min-height: 18px; transition: opacity 0.3s;
    }

    /* Step indicators */
    #steps {
      display: flex; flex-direction: column; gap: 10px;
      width: 100%; max-width: 260px; margin-bottom: 28px;
    }
    .step {
      display: flex; align-items: center; gap: 10px;
      opacity: 0.3; transition: opacity 0.4s;
    }
    .step.active  { opacity: 1; }
    .step.done    { opacity: 0.6; }
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.2); flex-shrink: 0;
      transition: background 0.4s;
    }
    .step.active .step-dot { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; }
    .step.done   .step-dot { background: #4ade80; }
    .step-label { color: #fff; font-size: 13px; }

    /* Progress bar */
    #progress-track {
      width: 100%; max-width: 260px; height: 3px;
      background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
    }
    #progress-fill {
      height: 100%; width: 0%; border-radius: 2px;
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      transition: width 0.4s ease;
    }

    /* ── Unmute button ────────────────────────────────────────────── */
    #unmute-btn {
      display: none;
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      align-items: center; gap: 8px;
      background: rgba(0,0,0,0.75); color: #fff; font-size: 14px; font-weight: 600;
      padding: 12px 20px; border-radius: 999px; z-index: 5;
      backdrop-filter: blur(8px); border: none; cursor: pointer; white-space: nowrap;
    }

    /* ── Scan hint ────────────────────────────────────────────────── */
    #hint {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65); color: #fff; font-size: 14px;
      padding: 10px 18px; border-radius: 999px; z-index: 5;
      backdrop-filter: blur(8px); transition: opacity 0.5s; white-space: nowrap;
    }

    /* ── Error screen ─────────────────────────────────────────────── */
    #error {
      position: fixed; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #0a0a0a 0%, #1a0808 100%);
      z-index: 20; padding: 32px;
    }
    #error-icon { font-size: 40px; margin-bottom: 16px; }
    #error p     { color: #fff; font-size: 16px; text-align: center; font-weight: 600; }
    #error small { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 10px; text-align: center; display: block; line-height: 1.5; }
    #reload-btn  {
      margin-top: 24px; padding: 12px 28px; border-radius: 999px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #000; font-size: 14px; font-weight: 700;
      border: none; cursor: pointer;
    }

    /* MindAR renders its canvas inside #scene-container */
    #scene-container { position: fixed; inset: 0; }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading">
    <div id="loading-logo">🖼️</div>
    <div id="loading-title">Getting your AR experience ready…</div>
    <div id="loading-sub"></div>

    <div id="steps">
      <div class="step" id="step-libs">
        <div class="step-dot"></div>
        <span class="step-label">Loading AR libraries</span>
      </div>
      <div class="step" id="step-frame">
        <div class="step-dot"></div>
        <span class="step-label">Downloading your frame</span>
      </div>
      <div class="step" id="step-camera">
        <div class="step-dot"></div>
        <span class="step-label">Starting camera</span>
      </div>
    </div>

    <div id="progress-track">
      <div id="progress-fill"></div>
    </div>
  </div>

  <button id="unmute-btn">🔊 Tap to enable sound</button>
  <div id="hint" style="display:none; opacity:0;">Point your camera at the photo frame</div>

  <div id="error">
    <div id="error-icon">⚠️</div>
    <p id="error-text">Something went wrong.</p>
    <small id="error-detail"></small>
    <button id="reload-btn" onclick="location.reload()">Try again</button>
  </div>

  <div id="scene-container"></div>

  <!-- Register service worker as early as possible (classic script, no defer needed) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/ar-sw.js', { scope: '/' }).catch(() => {})
    }
  </script>

  <script type="module">
    import { MindARThree } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js'
    import * as THREE from 'three'

    const frameId        = new URLSearchParams(location.search).get('frame')
    const loadingEl      = document.getElementById('loading')
    const loadingSub     = document.getElementById('loading-sub')
    const progressFill   = document.getElementById('progress-fill')
    const hintEl         = document.getElementById('hint')
    const unmuteBtn      = document.getElementById('unmute-btn')
    const errorEl        = document.getElementById('error')
    const errorText      = document.getElementById('error-text')
    const errorDetail    = document.getElementById('error-detail')
    const sceneContainer = document.getElementById('scene-container')

    function setStep(id, state) {
      // state: 'active' | 'done'
      const el = document.getElementById(id)
      if (!el) return
      el.classList.remove('active', 'done')
      el.classList.add(state)
    }

    function setProgress(pct, sub) {
      progressFill.style.width = pct + '%'
      if (sub !== undefined) loadingSub.textContent = sub
    }

    function showError(message, detail) {
      loadingEl.style.display = 'none'
      hintEl.style.display    = 'none'
      errorText.textContent   = message
      errorDetail.textContent = detail || ''
      errorEl.style.display   = 'flex'
      console.error('[AR] ERROR:', message, detail || '')
    }

    async function loadFrame() {
      let mindarThree  = null
      let targetBlobUrl = null

      try {
        // ── Step 1: AR libraries (already preloaded by modulepreload) ────
        setStep('step-libs', 'active')
        setProgress(10, 'AR libraries ready')
        // By the time this module script runs, Three.js + MindAR are already
        // downloaded and compiled by the modulepreload hints above.
        setStep('step-libs', 'done')
        setProgress(20)

        // ── Step 2: Fetch frame metadata ─────────────────────────────────
        setStep('step-frame', 'active')
        setProgress(25, 'Loading your frame…')

        if (!frameId) throw new Error('NO_FRAME_ID')

        const res = await fetch('/api/frames/' + frameId)
        if (!res.ok) {
          const body = await res.json().catch(() => ({}))
          throw new Error(body.error || 'Frame not found (HTTP ' + res.status + ')')
        }
        const { videoUrl, targetUrl, photoUrl } = await res.json()
        if (!videoUrl || !targetUrl) throw new Error('Frame data is incomplete.')

        setProgress(35, 'Downloading AR target…')

        // ── Step 3: Parallel asset fetch ─────────────────────────────────
        const absoluteTargetUrl = new URL(targetUrl, window.location.href).href

        const video = document.createElement('video')
        video.src     = videoUrl
        video.muted   = false
        video.loop    = true
        video.preload = 'auto'
        video.setAttribute('playsinline', '')
        video.setAttribute('webkit-playsinline', '')

        const photoImg = new Image()
        if (photoUrl) photoImg.src = photoUrl

        const [targetBlob] = await Promise.all([
          fetch(absoluteTargetUrl).then(r => {
            if (!r.ok) throw new Error('Failed to fetch AR target')
            return r.blob()
          }),
          new Promise((resolve) => {
            if (video.readyState >= 1) { resolve(); return }
            const t = setTimeout(resolve, 5000)
            video.addEventListener('loadedmetadata', () => { clearTimeout(t); resolve() }, { once: true })
          }),
          new Promise((resolve) => {
            if (!photoUrl || photoImg.complete) { resolve(); return }
            const t = setTimeout(resolve, 5000)
            photoImg.onload  = () => { clearTimeout(t); resolve() }
            photoImg.onerror = () => { clearTimeout(t); resolve() }
          }),
        ])

        targetBlobUrl = URL.createObjectURL(targetBlob)

        setStep('step-frame', 'done')
        setProgress(60, 'Building AR scene…')

        // ── Step 4: Build MindARThree ─────────────────────────────────────
        mindarThree = new MindARThree({
          container:      sceneContainer,
          imageTargetSrc: targetBlobUrl,
          uiScanning:     'no',
          uiLoading:      'no',
        })

        const { renderer, scene, camera } = mindarThree
        scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1))

        // ── Step 5: Video texture plane ───────────────────────────────────
        const pw = photoImg.naturalWidth  || video.videoWidth  || 4
        const ph = photoImg.naturalHeight || video.videoHeight || 3
        const planeH = 1 * (ph / pw)

        const videoTex      = new THREE.VideoTexture(video)
        videoTex.minFilter  = THREE.LinearFilter
        videoTex.magFilter  = THREE.LinearFilter
        videoTex.colorSpace = THREE.SRGBColorSpace

        const plane = new THREE.Mesh(
          new THREE.PlaneGeometry(1, planeH),
          new THREE.MeshBasicMaterial({ map: videoTex, side: THREE.DoubleSide })
        )
        mindarThree.addAnchor(0).group.add(plane)

        mindarThree.anchors[0].onTargetFound = () => {
          video.muted = false
          video.play().catch(() => {
            video.muted = true
            video.play().catch(e => console.warn('[AR] Video play failed:', e))
            unmuteBtn.style.display = 'flex'
          })
          hintEl.style.opacity = '0'
        }
        mindarThree.anchors[0].onTargetLost = () => {
          hintEl.style.opacity = '1'
        }

        // ── Step 6: Start camera ──────────────────────────────────────────
        setStep('step-camera', 'active')
        setProgress(70, 'Starting camera — tap Allow if prompted…')

        const permReminder = setTimeout(() => {
          if (loadingEl.style.display !== 'none') {
            setProgress(70, 'Waiting for camera permission…')
          }
        }, 4000)

        const hardTimeout = setTimeout(() => {
          clearTimeout(permReminder)
          if (mindarThree) mindarThree.stop().catch(() => {})
          showError('AR timed out.', 'Camera or tracker took too long. Tap "Try again".')
        }, 120000)

        await mindarThree.start()

        clearTimeout(hardTimeout)
        clearTimeout(permReminder)

        setStep('step-camera', 'done')
        setProgress(100)

        loadingEl.style.display = 'none'
        hintEl.style.display    = 'block'
        hintEl.style.opacity    = '1'

        unmuteBtn.addEventListener('click', () => {
          video.muted = false
          video.play().catch(() => {})
          unmuteBtn.style.display = 'none'
        })

        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
        renderer.setAnimationLoop(() => renderer.render(scene, camera))

      } catch (err) {
        console.error('[AR] loadFrame error:', err)
        if (mindarThree) mindarThree.stop().catch(() => {})
        if (targetBlobUrl) URL.revokeObjectURL(targetBlobUrl)

        const msg = (err && err.message) ? err.message : String(err)

        if (msg === 'NO_FRAME_ID') {
          showError('No frame found.', 'Please scan the QR code on the back of the frame.')
        } else if (/permission|notallowed|denied|camera/i.test(msg)) {
          showError(
            'Camera access denied.',
            'Allow camera access in your browser settings and tap "Try again".'
          )
        } else {
          showError('Unable to start AR.', msg)
        }
      }
    }

    loadFrame()
  </script>
</body>
</html>

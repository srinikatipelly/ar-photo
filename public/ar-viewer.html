<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta http-equiv="permissions-policy" content="camera=(self)" />
  <title>AR Frame</title>

  <!-- Preload heavy scripts so the browser fetches them in parallel with page parse -->
  <link rel="preload" as="script" crossorigin href="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.module.js">
  <link rel="preload" as="script" crossorigin href="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js">

  <!--
    Import map: tells the browser where to find "three" when the MindAR
    ES module does  import { ... } from "three".
    We use the exact version that MindAR 1.2.2 was built against.
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.132.2/examples/jsm/"
    }
  }
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; font-family: Arial, Helvetica, sans-serif; }

    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #000; z-index: 10;
    }
    #loading p     { color: #fff; font-size: 16px; margin-top: 16px; }
    #loading small { color: rgba(255,255,255,0.45); font-size: 12px; margin-top: 8px; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #hint {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65); color: #fff; font-size: 14px;
      padding: 10px 18px; border-radius: 999px; z-index: 5;
      backdrop-filter: blur(8px); transition: opacity 0.5s; white-space: nowrap;
    }

    #error {
      position: fixed; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: #000; z-index: 20; padding: 32px;
    }
    #error p     { color: #fff; font-size: 16px; text-align: center; }
    #error small { color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 12px; text-align: center; display: block; }
    #reload-btn  {
      margin-top: 20px; padding: 10px 24px; border-radius: 999px;
      background: #fff; color: #000; font-size: 14px; font-weight: 600;
      border: none; cursor: pointer;
    }

    /* MindAR renders its own canvas inside #scene-container */
    #scene-container { position: fixed; inset: 0; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-text">Loading AR frame…</p>
    <small id="loading-sub"></small>
  </div>

  <div id="hint" style="display:none; opacity:0;">Point your camera at the photo frame</div>

  <div id="error">
    <p id="error-text">Something went wrong.</p>
    <small id="error-detail"></small>
    <button id="reload-btn" onclick="location.reload()">Try again</button>
  </div>

  <div id="scene-container"></div>

  <!--
    type="module" — required to use ES import/export syntax.
    The importmap above maps "three" so the MindAR bundle can resolve it.
  -->
  <script type="module">
    import { MindARThree } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js'
    import * as THREE from 'three'

    const frameId        = new URLSearchParams(location.search).get('frame')
    const loadingEl      = document.getElementById('loading')
    const loadingText    = document.getElementById('loading-text')
    const loadingSub     = document.getElementById('loading-sub')
    const hintEl         = document.getElementById('hint')
    const errorEl        = document.getElementById('error')
    const errorText      = document.getElementById('error-text')
    const errorDetail    = document.getElementById('error-detail')
    const sceneContainer = document.getElementById('scene-container')

    function setStatus(main, sub) {
      loadingText.textContent = main
      loadingSub.textContent  = sub || ''
      console.log('[AR]', main, sub || '')
    }

    function showError(message, detail) {
      loadingEl.style.display = 'none'
      hintEl.style.display    = 'none'
      errorText.textContent   = message
      errorDetail.textContent = detail || ''
      errorEl.style.display   = 'flex'
      console.error('[AR] ERROR:', message, detail || '')
    }

    async function loadFrame() {
      let mindarThree = null
      let targetBlobUrl = null

      try {
        // ── 1. Fetch frame metadata ──────────────────────────────────────
        setStatus('Loading AR frame…', '')

        const res = await fetch('/api/frames/' + frameId)
        if (!res.ok) {
          const body = await res.json().catch(() => ({}))
          throw new Error(body.error || 'Frame not found (HTTP ' + res.status + ')')
        }
        const { videoUrl, targetUrl } = await res.json()
        if (!videoUrl || !targetUrl) throw new Error('Frame data is incomplete.')

        console.log('[AR] videoUrl:', videoUrl, 'targetUrl:', targetUrl)

        // ── 2. Parallel fetch: target blob + video metadata ──────────────
        // Kick both off immediately so they download while the user reads
        // the camera permission dialog — saves 1–3 s on slow connections.
        setStatus('Preparing AR…', 'Downloading assets…')

        const absoluteTargetUrl = new URL(targetUrl, window.location.href).href

        const video = document.createElement('video')
        video.src     = videoUrl
        video.muted   = true
        video.loop    = true
        video.preload = 'auto'
        video.setAttribute('playsinline', '')
        video.setAttribute('webkit-playsinline', '')

        const [targetBlob] = await Promise.all([
          // Download the .mind target file as a blob so MindAR reads it from
          // memory instead of re-fetching it over the network during start().
          fetch(absoluteTargetUrl).then(r => {
            if (!r.ok) throw new Error('Failed to fetch AR target')
            return r.blob()
          }),
          // Load video metadata in parallel (gets dimensions, primes the buffer)
          new Promise((resolve) => {
            if (video.readyState >= 1) { resolve(); return }
            const t = setTimeout(resolve, 5000)
            video.addEventListener('loadedmetadata', () => { clearTimeout(t); resolve() }, { once: true })
          }),
        ])

        targetBlobUrl = URL.createObjectURL(targetBlob)

        // ── 3. Build MindARThree with pre-downloaded target ──────────────
        setStatus('Initializing AR…', 'Starting camera…')

        mindarThree = new MindARThree({
          container:      sceneContainer,
          imageTargetSrc: targetBlobUrl,
          uiScanning:     'no',
          uiLoading:      'no',
        })

        const { renderer, scene, camera } = mindarThree

        scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1))

        // ── 4. Video texture plane ───────────────────────────────────────
        const vw = video.videoWidth  || 1280
        const vh = video.videoHeight || 720
        const planeW = 1
        const planeH = planeW * (vh / vw)
        console.log('[AR] Video dimensions:', vw, '×', vh, '→ plane', planeW, '×', planeH.toFixed(3))

        const videoTex     = new THREE.VideoTexture(video)
        videoTex.minFilter = THREE.LinearFilter
        videoTex.magFilter = THREE.LinearFilter

        const plane = new THREE.Mesh(
          new THREE.PlaneGeometry(planeW, planeH),
          new THREE.MeshBasicMaterial({ map: videoTex, side: THREE.DoubleSide })
        )

        const anchor = mindarThree.addAnchor(0)
        anchor.group.add(plane)

        anchor.onTargetFound = () => {
          console.log('[AR] Target found')
          video.play().catch(e => console.warn('[AR] Video play:', e))
          hintEl.style.opacity = '0'
        }
        anchor.onTargetLost = () => {
          console.log('[AR] Target lost')
          hintEl.style.opacity = '1'
        }

        // ── 5. Camera permission reminder ───────────────────────────────
        const permReminder = setTimeout(() => {
          if (loadingEl.style.display !== 'none') {
            setStatus('Camera permission needed', 'Tap ALLOW on the camera dialog, then wait…')
          }
        }, 5000)

        const hardTimeout = setTimeout(() => {
          clearTimeout(permReminder)
          if (mindarThree) mindarThree.stop().catch(() => {})
          showError('AR timed out.', 'Camera or tracker took too long. Tap "Try again".')
        }, 120000)

        // ── 6. Start — target already in memory, only camera init remains ─
        console.log('[AR] Calling mindarThree.start()…')
        await mindarThree.start()

        clearTimeout(hardTimeout)
        clearTimeout(permReminder)
        console.log('[AR] start() resolved — tracking is live')

        loadingEl.style.display = 'none'
        hintEl.style.display    = 'block'
        hintEl.style.opacity    = '1'

        // ── 7. Render loop ───────────────────────────────────────────────
        renderer.setAnimationLoop(() => renderer.render(scene, camera))

      } catch (err) {
        console.error('[AR] loadFrame error:', err)
        if (mindarThree) mindarThree.stop().catch(() => {})
        if (targetBlobUrl) URL.revokeObjectURL(targetBlobUrl)

        const msg = (err && err.message) ? err.message : String(err)
        if (/permission|notallowed|denied|camera/i.test(msg)) {
          showError(
            'Camera access denied.',
            'Allow camera access in your browser settings and tap "Try again".'
          )
        } else {
          showError('Unable to start AR.', msg)
        }
      }
    }

    if (!frameId) {
      showError('No frame ID found.', 'Please scan the QR code on the back of the frame.')
    } else {
      loadFrame()
    }
  </script>
</body>
</html>

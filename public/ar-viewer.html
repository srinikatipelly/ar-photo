  <script type="importmap">

  <!--
    modulepreload (not preload as="script") is the correct hint for ES modules.
    It tells the browser to download AND parse/compile each module eagerly —
    saving ~1-2s of compile time on mobile before the module script even runs.
    Three.js first so mind-ar's internal import resolves from the pre-compiled cache.

    Self-hosted from /vendor (three@0.132.2, mind-ar@1.2.2) so a live scan never
    depends on a third-party CDN staying up — the whole AR engine loads from our
    own origin. See ARCHITECTURE.md §7.
  -->
  <link rel="modulepreload" href="/vendor/three/three.module.js">
  <link rel="modulepreload" href="/vendor/mind-ar/mindar-image-three.prod.js">

  <!-- Early connection to the asset origin (R2) -->
  <link rel="preconnect" href="https://pub-4bff56c624244a6f948d870f253a8b4c.r2.dev" crossorigin>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #0a0a0a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    /* ── Loading screen ───────────────────────────────────────────── */
    /* Minimal luxury loader: static brand mark on brand green, a quietly
       cross-fading caption, and a thin gold→cream progress line. No spinner. */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      /* Brand green (#0F3535) — the exact colour the logo mark is designed on,
         so the transparent PNG sits seamlessly. Kept flat (no gradient) to avoid
         a visible seam against any green the mark itself carries. */
      background: #0F3535;
      z-index: 10; padding: 40px 32px;
    }

    #loading-logo {
      width: min(58vw, 240px); height: auto;
      /* Gentle continuous breathe — opacity only, no scale/throb. */
      animation: logo-breathe 3.6s ease-in-out infinite;
    }
    @keyframes logo-breathe {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.7; }
    }

    /* Status line — warm but restrained, in the brand cream. Fixed min-height
       fits the longest (2-line) phrase and centres it, so the bar below never
       jumps as the text changes. One line shows at a time (see JS). */
    #loading-caption {
      margin-top: 30px;
      color: rgba(249,230,194,0.72);
      font-size: 13px; letter-spacing: 0.08em; line-height: 1.5;
      text-align: center; min-height: 42px; max-width: 260px;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
    }
    #loading-caption.fade { opacity: 0; }

    /* Thin progress line (gold → cream) reflecting real asset-load progress. */
    #progress-track {
      margin-top: 10px;
      width: min(60vw, 220px); height: 2px;
      background: rgba(249,230,194,0.14); border-radius: 2px; overflow: hidden;
    }
    #progress-fill {
      height: 100%; width: 0%; border-radius: 2px;
      background: linear-gradient(90deg, #d4af37, #f9e6c2);
      transition: width 0.5s ease;
    }

    /* Respect users who ask the OS to minimise motion. */
    @media (prefers-reduced-motion: reduce) {
      #loading-caption, #progress-fill { transition: none; }
      #loading-logo { animation: none; }
    }

    /* ── Sound toggle (icon only) ─────────────────────────────────── */
    /* Sits on the same line as "Play as video" rather than up top, where the
       notch / Dynamic Island / Safari's own chrome hide it and where it is out
       of reach one-handed. Matches the watch button's glass styling. */
    #sound-btn {
      display: none;
      position: fixed; bottom: 84px; right: 16px;
      width: 48px; height: 48px; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.12); color: #fff;
      border-radius: 999px; z-index: 6; padding: 0;
      backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.28);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
    }
    #sound-btn:active { transform: scale(0.92); }
    #sound-btn svg { width: 22px; height: 22px; display: block; }
    #sound-btn .icon-off { display: none; }
    /* Muted means the customer is silently missing the audio, so make the
       button announce itself instead of waiting to be found. */
    #sound-btn.muted .icon-on  { display: none; }
    #sound-btn.muted .icon-off { display: block; }
    #sound-btn.muted {
      background: rgba(251,191,36,0.18);
      border-color: rgba(251,191,36,0.75);
      animation: sound-pulse 1.8s ease-in-out infinite;
    }
    @keyframes sound-pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(251,191,36,0); }
      50%      { box-shadow: 0 0 18px rgba(251,191,36,0.5); }
    }
    @media (prefers-reduced-motion: reduce) {
      #sound-btn.muted { animation: none; }
    }

    /* ── Interactive link overlay (Approach A) ─────────────────────────
       Real DOM <a> links positioned over the tracked card each frame.
       Only used when the frame provides a `links` array (or ?links= /
       ?demoLinks=1 for testing), so frames without links are unaffected. */
    #link-layer { position: fixed; inset: 0; z-index: 8; display: none; overflow: hidden; pointer-events: none; }
    #link-layer.show { display: block; }
    .ar-link {
      position: absolute; transform: translate(-50%, -50%);
      visibility: hidden; opacity: 0;
      align-items: center; gap: 6px; pointer-events: auto; cursor: pointer;
      padding: 9px 16px; border-radius: 999px;
      font-size: 13px; font-weight: 600; line-height: 1;
      color: #1a1a1a; text-decoration: none; white-space: nowrap;
      background: rgba(255,255,255,0.92); border: 1px solid rgba(251,191,36,0.9);
      box-shadow: 0 6px 20px -6px rgba(0,0,0,0.55); backdrop-filter: blur(6px);
      transition: opacity 0.3s ease, transform 0.12s ease;
      will-change: left, top;
    }
    #link-layer.show .ar-link { display: inline-flex; opacity: 1; }
    .ar-link:active { transform: translate(-50%, -50%) scale(0.94); }

    /* ── Scan hint ────────────────────────────────────────────────── */
    #hint {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65); color: #fff; font-size: 14px;
      padding: 10px 18px; border-radius: 999px; z-index: 5;
      backdrop-filter: blur(8px); transition: opacity 0.5s; white-space: nowrap;
    }

    /* ── Error screen ─────────────────────────────────────────────── */
    #error {
      position: fixed; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #0a0a0a 0%, #1a0808 100%);
      z-index: 20; padding: 32px;
    }
    #error-icon { font-size: 40px; margin-bottom: 16px; }
    #error p     { color: #fff; font-size: 16px; text-align: center; font-weight: 600; }
    #error small { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 10px; text-align: center; display: block; line-height: 1.5; }
    #reload-btn  {
      margin-top: 24px; padding: 12px 28px; border-radius: 999px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #000; font-size: 14px; font-weight: 700;
      border: none; cursor: pointer;
    }

    /* ── Watch-without-camera button (shown once the camera is live) ─ */
    #watch-btn {
      display: none;
      position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
      align-items: center; gap: 8px;
      background: rgba(255,255,255,0.12); color: #fff; font-size: 14px; font-weight: 600;
      padding: 11px 20px; border-radius: 999px; z-index: 5;
      backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.28);
      cursor: pointer; white-space: nowrap;
    }
    #watch-btn.nudge { animation: nudge-pulse 1.6s ease-in-out infinite; }
    @keyframes nudge-pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(251,191,36,0);   border-color: rgba(255,255,255,0.28); }
      50%      { box-shadow: 0 0 20px rgba(251,191,36,0.55); border-color: rgba(251,191,36,0.85); }
    }

    /* Off-screen home for the AR video whenever it is only feeding the WebGL
       texture. It has to stay in the document (a media element removed from the
       document gets paused by the browser) and stay rendered - display:none can
       stop frame decoding, which would freeze the texture. */
    #video-dock {
      position: fixed; left: -9999px; top: 0;
      width: 1px; height: 1px; opacity: 0; pointer-events: none;
    }

    /* ── Full-screen steady player (no camera, zero shake) ─────────── */
    #player {
      position: fixed; inset: 0; z-index: 30; display: none;
      flex-direction: column; background: #000;
    }
    #player.show { display: flex; }
    #player-bar {
      display: flex; align-items: center;
      padding: calc(env(safe-area-inset-top) + 14px) 16px 14px;
    }
    #player-back {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.14); color: #fff;
      font-size: 15px; font-weight: 600; padding: 10px 18px;
      border-radius: 999px; border: none; cursor: pointer;
      backdrop-filter: blur(8px);
    }
    #player-stage {
      flex: 1; display: flex; align-items: center; justify-content: center;
      overflow: hidden; padding: 0 8px;
    }
    #player-stage video {
      width: 100%; height: auto; max-height: 100%;
      border-radius: 14px; background: #000;
    }
    #player-caption {
      color: rgba(255,255,255,0.65); font-size: 13px; font-style: italic;
      text-align: center; padding: 14px 24px calc(env(safe-area-inset-bottom) + 20px);
    }

    /* Fallback "watch" button on the error screen */
    #error-watch-btn {
      display: none; margin-top: 20px; padding: 13px 28px; border-radius: 999px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000;
      font-size: 14px; font-weight: 700; border: none; cursor: pointer;
    }

    /* MindAR renders its canvas inside #scene-container */
    #scene-container { position: fixed; inset: 0; }
  </style>

<body>

  <!-- Loading screen — static brand mark, cross-fading caption, thin progress line -->
  <div id="loading">
    <img id="loading-logo" src="/logo-mark.png" alt="The Golden Frame" />
    <div id="loading-caption" aria-live="polite">Preparing your augmented reality experience</div>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>

  <button id="sound-btn" aria-label="Turn sound off" aria-pressed="true">
    <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M11 5 6 9H2v6h4l5 4V5z"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
    <svg class="icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M11 5 6 9H2v6h4l5 4V5z"/>
      <line x1="22" y1="9" x2="16" y2="15"/>

  <div id="error">

    <button id="reload-btn" onclick="location.reload()">Try again</button>
  </div>

  <div id="scene-container"></div>

  <!-- Keeps the AR video attached to the document while it is only a texture. -->
  <div id="video-dock"></div>

  <!-- Real DOM links positioned over the tracked card each frame (Approach A). -->
  <div id="link-layer"></div>

  <!-- Full-screen, steady (no-camera) player. The AR video element is moved in
       here on demand, so there is zero tracking jitter while it plays. -->
  <div id="player">
    <div id="player-bar">
      <button id="player-back">‹ Back to camera</button>
    </div>
    <div id="player-stage"></div>
    <div id="player-caption">Playing your memory ✨</div>
  </div>

  <!-- Register service worker as early as possible (classic script, no defer needed) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/ar-sw.js', { scope: '/' }).catch(() => {})
    }
  </script>

  <script type="module">
    import { MindARThree } from '/vendor/mind-ar/mindar-image-three.prod.js'
    import * as THREE from 'three'

    const frameId        = new URLSearchParams(location.search).get('frame')
    const loadingEl      = document.getElementById('loading')
    const loadingCaption = document.getElementById('loading-caption')
    const progressFill   = document.getElementById('progress-fill')
    const hintEl         = document.getElementById('hint')

    // Warm, restrained status lines that cross-fade while the assets download.
    const CAPTIONS = [
      'Preparing your augmented reality experience',
      'Bringing your memory to life',
      'Almost there - hold tight',
    ]
    let captionIndex = 0
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches
    function advanceCaption() {
      captionIndex = (captionIndex + 1) % CAPTIONS.length
      loadingCaption.textContent = CAPTIONS[captionIndex]
    }
    // Fade the current line fully OUT, then swap + fade the next line IN. The
    // swap is driven by transitionend, so the two lines never overlap.
    const captionTimer = setInterval(() => {
      if (reduceMotion) advanceCaption()          // no fade: just swap the text
      else loadingCaption.classList.add('fade')   // begin fading the current line out
    }, 2600)
    loadingCaption.addEventListener('transitionend', (e) => {
      if (e.propertyName !== 'opacity') return
      if (!loadingCaption.classList.contains('fade')) return  // ignore the fade-in end
      advanceCaption()
      loadingCaption.classList.remove('fade')       // fade the new line in
    })
    const soundBtn       = document.getElementById('sound-btn')
    const errorEl        = document.getElementById('error')
    const errorText      = document.getElementById('error-text')
    const errorDetail    = document.getElementById('error-detail')
    const sceneContainer = document.getElementById('scene-container')
    const watchBtn       = document.getElementById('watch-btn')
    const errorWatchBtn  = document.getElementById('error-watch-btn')
    const playerEl       = document.getElementById('player')
    const playerStage    = document.getElementById('player-stage')
    const playerBack     = document.getElementById('player-back')
    const videoDock      = document.getElementById('video-dock')

    // Shared state so the fallback player works from both AR and error screens.
    let arVideo     = null   // the <video> used as the AR texture AND the player source
    let arActive    = false  // true once the live AR camera is running
    let targetFound = false  // has the printed photo been detected at least once?

    // ── Steady full-screen player (no camera, so zero tracking shake) ──
    // We move the very same <video> element into the player, so playback and
    // sound continue seamlessly whether it's shown as an AR texture or here.
    function openPlayer() {
      if (!arVideo) return
      playerBack.textContent = arActive ? '‹ Back to camera' : '‹ Back'
      playerStage.appendChild(arVideo)
      arVideo.setAttribute('controls', '')
      arVideo.muted = false
      arVideo.play().catch(() => {})
      errorEl.style.display = 'none'
      soundBtn.style.display = 'none'   // full-screen player has its own controls
      playerEl.classList.add('show')
    }

    function closePlayer() {
      playerEl.classList.remove('show')
      arVideo.removeAttribute('controls')
      if (arActive) {
        // Park it back in the dock so it returns to being purely the AR texture
        // source. It must move to another in-document parent rather than be
        // detached: the browser pauses a media element that leaves the document,
        // and it does so asynchronously, so a play() here would be undone a
        // moment later and the AR video would stop.
        videoDock.appendChild(arVideo)
        arVideo.play().catch(() => {})   // also resumes if they paused via the controls
        soundBtn.style.display = 'flex'   // restore the sound toggle over the camera
        syncSoundIcon()
      } else {
        // Camera never started — send them back to the error screen.
        errorEl.style.display = 'flex'
      }
    }

    watchBtn.addEventListener('click', openPlayer)
    errorWatchBtn.addEventListener('click', openPlayer)
    playerBack.addEventListener('click', closePlayer)

    // ── Sound toggle ──────────────────────────────────────────────────
    // The video plays with sound ON by default; this icon lets the viewer
    // mute/unmute. It also recovers the case where the browser blocks un-muted
    // autoplay: we fall back to muted, the button shows the muted icon and
    // pulses, and one tap enables sound.
    // Toggles a class rather than writing textContent, which would delete the
    // button's SVG icons.
    function syncSoundIcon() {
      const muted = !!(arVideo && arVideo.muted)
      soundBtn.classList.toggle('muted', muted)
      soundBtn.setAttribute('aria-label', muted ? 'Turn sound on' : 'Turn sound off')
      soundBtn.setAttribute('aria-pressed', muted ? 'false' : 'true')
    }
    soundBtn.addEventListener('click', () => {
      if (!arVideo) return
      arVideo.muted = !arVideo.muted
      if (!arVideo.muted) arVideo.play().catch(() => {})
      syncSoundIcon()
    })

    function setStep(id, state) {
      // state: 'active' | 'done'
      const el = document.getElementById(id)
      if (!el) return
      el.classList.remove('active', 'done')
      el.classList.add(state)
    }

    function setProgress(pct) {
      if (progressFill) progressFill.style.width = pct + '%'
    }

    function showError(message, detail) {
      clearInterval(captionTimer)
      loadingEl.style.display = 'none'
      hintEl.style.display    = 'none'
      errorText.textContent   = message
      errorDetail.textContent = detail || ''
      // If we already have the video, always offer the no-camera fallback so
      // the customer can still see their memory even when AR can't start.
      errorWatchBtn.style.display = arVideo ? 'inline-block' : 'none'
      errorEl.style.display   = 'flex'
      console.error('[AR] ERROR:', message, detail || '')
    }

    // Request the camera permission as early as possible, in parallel with asset
    // downloads, then release the stream. By the time MindAR.start() runs the
    // permission is already granted, so the camera opens instantly with no second
    // prompt — the scan feels seamless instead of stalling at the end.
    async function prewarmCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
        })
        stream.getTracks().forEach((t) => t.stop())
      } catch (e) {
        // Denied / no camera — MindAR.start() will surface a friendly error later.
        console.warn('[AR] camera prewarm failed:', e)
      }
    }

    // ── Interactive links (Approach A) ─────────────────────────────────
    // A link is { label, url, x, y } where x,y are 0..1 fractions of the card
    // (0,0 = top-left). Links come from the frame payload in production; the
    // ?links= and ?demoLinks= params exist only for testing on the phone.
    const DEMO_LINKS = [
      { label: 'Visit website', url: 'https://www.thegoldenframe.com.au',                 x: 0.5, y: 0.50 },
      { label: 'Instagram',     url: 'https://www.instagram.com/thegoldenframe',          x: 0.5, y: 0.68 },
      { label: 'Save contact',  url: 'https://www.thegoldenframe.com.au/landing/contact', x: 0.5, y: 0.86 },
    ]

    const clamp01 = (n) => (Number.isFinite(n) ? Math.min(1, Math.max(0, n)) : 0.5)

    // Keep only well-formed links, and only http(s) URLs — never javascript:
    // or data: — since a link list can arrive from an untrusted URL param.
    function sanitizeLinks(arr) {
      if (!Array.isArray(arr)) return []
      return arr
        .map((l) => {
          if (!l || typeof l.label !== 'string' || typeof l.url !== 'string') return null
          let ok = false
          try { const u = new URL(l.url); ok = u.protocol === 'https:' || u.protocol === 'http:' } catch (e) { /* invalid */ }
          if (!ok) return null
          return { label: l.label.slice(0, 40), url: l.url, x: clamp01(Number(l.x)), y: clamp01(Number(l.y)) }
        })
        .filter(Boolean)
        .slice(0, 6)
    }

    function resolveLinks(payloadLinks) {
      const fromPayload = sanitizeLinks(payloadLinks)
      if (fromPayload.length) return fromPayload
      const params = new URLSearchParams(location.search)
      if (params.get('demoLinks') === '1') return sanitizeLinks(DEMO_LINKS)
      const raw = params.get('links')
      if (raw) { try { return sanitizeLinks(JSON.parse(raw)) } catch (e) { return [] } }
      return []
    }

    async function loadFrame() {
      let mindarThree  = null
      let targetBlobUrl = null

      // MindAR's stop() is synchronous and returns undefined, so it must not be
      // treated as a promise: `stop().catch(...)` throws a TypeError *after* stop()
      // has already killed the camera, which aborts whichever handler called it
      // and strands the viewer on a black screen with no error shown.
      const stopAR = () => {
        if (!mindarThree) return
        try {
          mindarThree.stop()
        } catch (e) {
          console.warn('[AR] stop failed:', e)
        }
      }

      // Fire the camera prompt up front (don't block asset loading on it).
      setStep('step-camera', 'active')
      const cameraPrewarm = prewarmCamera()

      try {
        // ── Step 1: AR libraries (already preloaded by modulepreload) ────
        setStep('step-libs', 'active')
        setProgress(10, 'AR libraries ready')
        // By the time this module script runs, Three.js + MindAR are already
        // downloaded and compiled by the modulepreload hints above.
        setStep('step-libs', 'done')
        setProgress(20)

        // ── Step 2: Fetch frame metadata ─────────────────────────────────
        setStep('step-frame', 'active')
        setProgress(25, 'Loading your frame…')

        if (!frameId) throw new Error('NO_FRAME_ID')

        const res = await fetch('/api/frames/' + frameId)
        if (!res.ok) {
          const body = await res.json().catch(() => ({}))
          throw new Error(body.error || 'Frame not found (HTTP ' + res.status + ')')
        }
        const { videoUrl, targetUrl, photoUrl, links: payloadLinks } = await res.json()
        if (!videoUrl || !targetUrl) throw new Error('Frame data is incomplete.')

        setProgress(35, 'Downloading AR target…')

        // ── Step 3: Parallel asset fetch ─────────────────────────────────
        const absoluteTargetUrl = new URL(targetUrl, window.location.href).href

        const video = document.createElement('video')
        video.crossOrigin = 'anonymous'  // required for WebGL VideoTexture on direct R2 URL
        video.src     = videoUrl
        video.muted   = false
        video.loop    = true
        video.preload = 'auto'
        video.setAttribute('playsinline', '')
        video.setAttribute('webkit-playsinline', '')
        videoDock.appendChild(video)  // keep it in the document from the start
        arVideo = video  // share with the no-camera fallback player

        const photoImg = new Image()
        if (photoUrl) photoImg.src = photoUrl

        const [targetBlob] = await Promise.all([
          fetch(absoluteTargetUrl).then(r => {
            if (!r.ok) throw new Error('Failed to fetch AR target')
            return r.blob()
          }),
          new Promise((resolve) => {
            if (video.readyState >= 1) { resolve(); return }
            const t = setTimeout(resolve, 5000)
            video.addEventListener('loadedmetadata', () => { clearTimeout(t); resolve() }, { once: true })
          }),
          new Promise((resolve) => {
            if (!photoUrl || photoImg.complete) { resolve(); return }
            const t = setTimeout(resolve, 5000)
            photoImg.onload  = () => { clearTimeout(t); resolve() }
            photoImg.onerror = () => { clearTimeout(t); resolve() }
          }),
        ])

        targetBlobUrl = URL.createObjectURL(targetBlob)

        setStep('step-frame', 'done')
        setProgress(60, 'Building AR scene…')

        // ── Step 4: Build MindARThree ─────────────────────────────────────
        mindarThree = new MindARThree({
          container:      sceneContainer,
          imageTargetSrc: targetBlobUrl,
          uiScanning:     'no',
          uiLoading:      'no',
          // ── Stability tuning ──────────────────────────────────────────
          // Lower filterMinCF = more smoothing of the tracked pose (less jitter
          // when the frame is held fairly still). filterBeta trades a little lag
          // for responsiveness on movement. missTolerance keeps the video on
          // screen through brief tracking dropouts so it doesn't flicker/pop out.
          filterMinCF:     0.0001,
          filterBeta:      0.001,
          // Higher tolerances = the video rides through brief tracking dropouts
          // instead of flickering/popping out, so it sits far steadier inside the
          // printed frame. Steady playback with no shake at all = the Watch
          // without camera button, which plays the video screen-locked.
          missTolerance:   16,
          warmupTolerance: 5,
        })

        const { renderer, scene, camera } = mindarThree
        scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1))

        // ── Step 5: Video texture plane ───────────────────────────────────
        const pw = photoImg.naturalWidth  || video.videoWidth  || 4
        const ph = photoImg.naturalHeight || video.videoHeight || 3

        // Invisible safe-border: inset the video slightly inside the tracked
        // photo so tracking jitter never lets the video edges spill outside the
        // printed frame. The thin margin reads as a subtle border, not a glitch.
        const INSET = 0.94
        const planeW = 1 * INSET
        const planeH = 1 * (ph / pw) * INSET

        const videoTex      = new THREE.VideoTexture(video)
        videoTex.minFilter  = THREE.LinearFilter
        videoTex.magFilter  = THREE.LinearFilter
        videoTex.colorSpace = THREE.SRGBColorSpace

        const plane = new THREE.Mesh(
          new THREE.PlaneGeometry(planeW, planeH),
          new THREE.MeshBasicMaterial({ map: videoTex, side: THREE.DoubleSide })
        )
        mindarThree.addAnchor(0).group.add(plane)

        mindarThree.anchors[0].onTargetFound = () => {
          targetFound = true
          watchBtn.classList.remove('nudge')
          // Play with sound ON by default. If the browser blocks un-muted
          // autoplay, fall back to muted — the 🔇 icon then invites one tap.
          video.muted = false
          video.play().then(() => {
            syncSoundIcon()
          }).catch(() => {
            video.muted = true
            video.play().catch(e => console.warn('[AR] Video play failed:', e))
            syncSoundIcon()
          })
          soundBtn.style.display = 'flex'
          syncSoundIcon()
          hintEl.style.opacity = '0'
        }
        mindarThree.anchors[0].onTargetLost = () => {
          hintEl.style.opacity = '1'
        }

        // ── Interactive link overlay (Approach A: DOM synced to the anchor) ──
        // Each frame we project a point on the card into screen space and move a
        // real <a> there, so links track the card but stay crisp, tappable and
        // openable like any web link. No-op unless the frame supplies links.
        const links = resolveLinks(payloadLinks)
        let updateLinkOverlay = () => {}
        if (links.length) {
          const layer       = document.getElementById('link-layer')
          const anchorGroup = mindarThree.anchors[0].group
          const cardW = planeW / INSET          // card spans width 1 in target units
          const cardH = planeH / INSET          // …and height photoH/photoW
          const els = links.map((lnk) => {
            const a = document.createElement('a')
            a.className   = 'ar-link'
            a.href        = lnk.url
            a.target      = '_blank'
            a.rel         = 'noopener noreferrer'
            a.textContent = lnk.label
            layer.appendChild(a)
            return a
          })
          const v = new THREE.Vector3()
          updateLinkOverlay = () => {
            if (!targetFound) { layer.classList.remove('show'); return }
            layer.classList.add('show')
            const rect = renderer.domElement.getBoundingClientRect()
            for (let i = 0; i < links.length; i++) {
              const lnk = links[i], el = els[i]
              // Card-local point (y is top-down in the fractions), then to world,
              // then to normalised device coords via the AR camera.
              v.set((lnk.x - 0.5) * cardW, (0.5 - lnk.y) * cardH, 0.001)
              anchorGroup.localToWorld(v)
              v.project(camera)
              if (v.z >= 1) { el.style.visibility = 'hidden'; continue }  // behind camera
              el.style.left = (rect.left + (v.x * 0.5 + 0.5) * rect.width) + 'px'
              el.style.top  = (rect.top + (-v.y * 0.5 + 0.5) * rect.height) + 'px'
              el.style.visibility = 'visible'
            }
          }
        }

        // ── Step 6: Start camera ──────────────────────────────────────────
        setStep('step-camera', 'active')
        setProgress(70, 'Opening your camera…')

        const hardTimeout = setTimeout(() => {
          stopAR()
          showError('AR timed out.', 'Camera or tracker took too long. Tap "Try again".')
        }, 120000)

        // Permission was already requested up front — this resolves immediately
        // once the user has allowed access (or has previously allowed it).
        await cameraPrewarm
        await mindarThree.start()

        clearTimeout(hardTimeout)

        setStep('step-camera', 'done')
        setProgress(100)

        clearInterval(captionTimer)
        loadingEl.style.display = 'none'
        hintEl.style.display    = 'block'
        hintEl.style.opacity    = '1'

        // Camera is live — offer the no-camera option, and gently draw attention
        // to it if the customer hasn't managed to scan the frame after a while.
        arActive = true
        watchBtn.style.display = 'flex'
        setTimeout(() => {
          if (!targetFound && arActive) {
            watchBtn.classList.add('nudge')
            hintEl.textContent = "Trouble scanning? Tap “Play as video” below"
          }
        }, 12000)

        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
        renderer.setAnimationLoop(() => {
          renderer.render(scene, camera)
          updateLinkOverlay()
        })

      } catch (err) {
        console.error('[AR] loadFrame error:', err)
        stopAR()
        if (targetBlobUrl) URL.revokeObjectURL(targetBlobUrl)

        const msg = (err && err.message) ? err.message : String(err)

        if (msg === 'NO_FRAME_ID') {
          showError('No frame found.', 'Please scan the QR code on the back of the frame.')
        } else if (/permission|notallowed|denied|camera/i.test(msg)) {
          showError(
            'Camera access denied.',
            'Allow camera access in your browser settings and tap "Try again".'
          )
        } else {
          showError('Unable to start AR.', msg)
        }
      }
    }

    loadFrame()
  </script>
</body>
</html>
